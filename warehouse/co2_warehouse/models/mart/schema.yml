version: 2

models:
  - name: mart_country_emissions
    description: "Final analytics table: country-year emissions with YoY metrics and trend label."
    tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns: [iso_code, year]
    columns:
      - name: iso_code
        tests:
          - not_null
      - name: year
        tests:
          - not_null
      - name: country_name
        tests:
          - not_null

  - name: mart_ml_features
    description: "Gold-tier ML feature table consumed by N-HiTS, LSTM-AE, and the staggered-DiD causal model. Built from silver_conformed.country_year_panel."
    tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns: [iso_code, year]
    columns:
      - name: iso_code
        tests:
          - not_null
      - name: year
        tests:
          - not_null
      - name: paris_treated
        description: "TRUE iff ratification_year is non-null and year >= ratification_year. Set upstream by silver_clean_spark.py — NULL here would indicate a join failure."
        tests:
          - not_null
          - accepted_values:
              values: [true, false]
      - name: years_since_ratification
        description: "0 for non-ratifying countries and pre-treatment years; otherwise year - ratification_year. NULL would indicate a join failure."
        tests:
          - not_null
      - name: ratification_year
        description: "NULL only for countries that never ratified the Paris Agreement; otherwise the year of ratification."
