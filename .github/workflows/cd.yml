name: Deploy to HuggingFace Spaces
on:
  push:
    branches: [main]

jobs:
  deploy-api:
    name: Deploy API Space (Docker SDK)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install huggingface-hub
        run: pip install huggingface-hub

      - name: Prepare and upload API Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          if [ -z "$HF_TOKEN" ]; then
            echo "HF_TOKEN not set — skipping deploy"
            exit 0
          fi

          STAGING=$(mktemp -d)

          # Copy Dockerfile (renamed from Dockerfile.api)
          cp Dockerfile.api "$STAGING/Dockerfile"

          # Copy source code and dependencies
          cp pyproject.toml "$STAGING/"
          cp README.md "$STAGING/"
          cp -r src "$STAGING/"
          cp -r api "$STAGING/"
          cp -r configs "$STAGING/"
          cp -r models "$STAGING/"

          # Regenerate Bronze -> Silver -> dbt Gold mart -> exported parquet (DVC-tracked, not in git)
          pip install -e . --quiet
          TODAY=$(date -u +%Y-%m-%d)
          mkdir -p "data/bronze/owid_co2/ingestion_date=${TODAY}" data/bronze/worldbank_wdi data/bronze/paris_ratifications data/silver/conformed data/warehouse data/gold
          python -m co2_ml.pipelines.ingest
          python -m co2_ml.pipelines.ingest_worldbank
          python -m co2_ml.pipelines.ingest_paris
          python -m co2_ml.pipelines.silver_clean_pandas
          # Build Gold via dbt (writes mart_ml_features into data/warehouse/co2.duckdb)
          dbt run --profiles-dir . --project-dir warehouse/co2_warehouse
          # Export the dbt mart to flat parquet at data/gold/ml_features.parquet (system of record for the API)
          python -c "import duckdb,pandas as pd,pathlib; pathlib.Path('data/gold').mkdir(parents=True,exist_ok=True); con=duckdb.connect('data/warehouse/co2.duckdb'); df=con.execute('SELECT * FROM mart_ml_features').df(); df.to_parquet('data/gold/ml_features.parquet',index=False); print(f'Gold parquet: {len(df)} rows x {len(df.columns)} cols')"

          mkdir -p "$STAGING/data/gold"
          cp data/gold/ml_features.parquet "$STAGING/data/gold/"

          # Write HF Space README with required frontmatter
          cat > "$STAGING/README.md" <<'EOF'
          ---
          title: Global CO2 Insight API
          emoji: 🌍
          colorFrom: blue
          colorTo: green
          sdk: docker
          app_port: 8000
          pinned: false
          ---
          EOF
          sed -i 's/^[[:space:]]*//' "$STAGING/README.md"

          # Upload to HF Space
          hf upload \
            jurinho17-sv/global-co2-insight-api \
            "$STAGING" . \
            --repo-type space \
            --token "$HF_TOKEN"

  deploy-frontend:
    name: Deploy Frontend Space (Streamlit SDK)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install huggingface-hub
        run: pip install huggingface-hub

      - name: Prepare and upload Frontend Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          if [ -z "$HF_TOKEN" ]; then
            echo "HF_TOKEN not set — skipping deploy"
            exit 0
          fi

          STAGING=$(mktemp -d)

          # Streamlit SDK expects app.py at root
          cp frontend/app.py "$STAGING/app.py"

          # Copy component modules if they have content
          if [ -d frontend/components ]; then
            cp -r frontend/components "$STAGING/components"
          fi

          # Copy frontend pages if any exist
          if [ -d frontend/pages ] && [ "$(ls -A frontend/pages)" ]; then
            cp -r frontend/pages "$STAGING/pages"
          fi

          # Generate requirements.txt
          cat > "$STAGING/requirements.txt" <<'REQEOF'
          streamlit
          httpx
          plotly
          pandas
          REQEOF
          # Remove leading whitespace from heredoc
          sed -i 's/^[[:space:]]*//' "$STAGING/requirements.txt"

          # Write HF Space README with required frontmatter
          cat > "$STAGING/README.md" <<'EOF'
          ---
          title: Global CO2 Insight
          emoji: 🌱
          colorFrom: green
          colorTo: blue
          sdk: docker
          app_port: 8501
          pinned: false
          ---
          EOF
          sed -i 's/^[[:space:]]*//' "$STAGING/README.md"

          # Write minimal Dockerfile for HF Space (flat staging structure)
          cat > "$STAGING/Dockerfile" <<'EOF'
          FROM python:3.11-slim
          WORKDIR /app
          COPY requirements.txt .
          RUN pip install --no-cache-dir streamlit httpx plotly pandas
          COPY . .
          EXPOSE 8501
          CMD ["streamlit", "run", "app.py", "--server.port=8501", "--server.address=0.0.0.0"]
          EOF
          sed -i 's/^[[:space:]]*//' "$STAGING/Dockerfile"

          # Upload to HF Space
          hf upload \
            jurinho17-sv/global-co2-insight \
            "$STAGING" . \
            --repo-type space \
            --token "$HF_TOKEN"
