name: Deploy to HuggingFace Spaces
on:
  push:
    branches: [main]

jobs:
  deploy-api:
    name: Deploy API Space (Docker SDK)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install huggingface-hub
        run: pip install huggingface-hub

      - name: Prepare and upload API Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          if [ -z "$HF_TOKEN" ]; then
            echo "HF_TOKEN not set — skipping deploy"
            exit 0
          fi

          STAGING=$(mktemp -d)

          # Copy Dockerfile (renamed from Dockerfile.api)
          cp Dockerfile.api "$STAGING/Dockerfile"

          # Copy source code and dependencies
          cp pyproject.toml "$STAGING/"
          cp README.md "$STAGING/"
          cp -r src "$STAGING/"
          cp -r api "$STAGING/"
          cp -r configs "$STAGING/"
          cp -r models "$STAGING/"

          # Regenerate ml_ready.parquet (DVC-tracked, not in git)
          pip install -e . --quiet
          mkdir -p data/raw data/processed
          python -c "from co2_ml.pipelines.ingest import download_owid_data; download_owid_data('https://raw.githubusercontent.com/owid/co2-data/master/owid-co2-data.csv', 'data/raw/owid-co2-data.csv')"
          python -c "from co2_ml.pipelines.preprocess import preprocess; preprocess('data/raw/owid-co2-data.csv', 'data/processed/ml_ready.parquet')"

          mkdir -p "$STAGING/data/processed"
          cp data/processed/ml_ready.parquet "$STAGING/data/processed/"

          # Write HF Space README with required frontmatter
          cat > "$STAGING/README.md" <<'EOF'
          ---
          title: Global CO2 Insight API
          emoji: 🌍
          colorFrom: blue
          colorTo: green
          sdk: docker
          app_port: 8000
          pinned: false
          ---
          EOF
          sed -i 's/^[[:space:]]*//' "$STAGING/README.md"

          # Upload to HF Space
          hf upload \
            jurinho17-sv/global-co2-insight-api \
            "$STAGING" . \
            --repo-type space \
            --token "$HF_TOKEN"

  deploy-frontend:
    name: Deploy Frontend Space (Streamlit SDK)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install huggingface-hub
        run: pip install huggingface-hub

      - name: Prepare and upload Frontend Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          if [ -z "$HF_TOKEN" ]; then
            echo "HF_TOKEN not set — skipping deploy"
            exit 0
          fi

          STAGING=$(mktemp -d)

          # Streamlit SDK expects app.py at root
          cp frontend/app.py "$STAGING/app.py"

          # Copy component modules if they have content
          if [ -d frontend/components ]; then
            cp -r frontend/components "$STAGING/components"
          fi

          # Generate requirements.txt
          cat > "$STAGING/requirements.txt" <<'REQEOF'
          streamlit
          httpx
          plotly
          pandas
          REQEOF
          # Remove leading whitespace from heredoc
          sed -i 's/^[[:space:]]*//' "$STAGING/requirements.txt"

          # Write HF Space README with required frontmatter
          cat > "$STAGING/README.md" <<'EOF'
          ---
          title: Global CO2 Insight
          emoji: 🌱
          colorFrom: green
          colorTo: blue
          sdk: docker
          app_port: 8501
          pinned: false
          ---
          EOF
          sed -i 's/^[[:space:]]*//' "$STAGING/README.md"

          # Use our Dockerfile (overrides HF template default)
          cp Dockerfile.frontend "$STAGING/Dockerfile"

          # Upload to HF Space
          hf upload \
            jurinho17-sv/global-co2-insight \
            "$STAGING" . \
            --repo-type space \
            --token "$HF_TOKEN"
