name: CI
on:
  push:
    branches: ["*"]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v3
      - name: Set up Python
        run: uv python install 3.11
      - name: Install dependencies
        run: uv sync --all-extras
      - name: Lint
        run: uv run ruff check src/ tests/
      - name: Type check
        run: uv run mypy src/co2_ml --ignore-missing-imports
      - name: Test
        run: uv run pytest tests/unit/ -v --cov=src/co2_ml --cov-report=term-missing
      - name: Validate data schema
        run: uv run python tests/data/validate_owid.py
