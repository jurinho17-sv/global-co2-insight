name: CI
on:
  push:
    branches: ["*"]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install lightweight dependencies only
        run: |
          pip install pandas numpy scikit-learn pytest pytest-cov ruff mypy pydantic pydantic-settings omegaconf hydra-core statsmodels
      - name: Lint
        run: ruff check src/ tests/
      - name: Type check
        run: mypy src/co2_ml --ignore-missing-imports
      - name: Run unit tests (no GPU deps)
        run: pytest tests/unit/ -v --ignore=tests/unit/test_causal.py -k "not nhits and not chronos and not lstm and not shap and not dowhy"
      - name: Validate data schema
        run: python tests/data/validate_owid.py
