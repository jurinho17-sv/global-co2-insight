layer: silver
asset: country_year_panel
storage:
  format: parquet
  path: data/silver/conformed/country_year_panel.parquet
  load_pattern: overwrite
producers:
  - src/co2_ml/pipelines/silver_clean_spark.py  # production (DataHub PySpark)
  - src/co2_ml/pipelines/silver_clean_pandas.py # local fallback (schema-identical)
upstream:
  - data/bronze/owid_co2/                       # OWID Bronze (partitioned by ingestion_date)
  - data/bronze/worldbank_wdi/                  # WorldBank WDI Bronze (partitioned by ingestion_date)
  - data/bronze/paris_ratifications/ratification_dates.parquet
contract:
  primary_key: [iso_code, year]
  uniqueness_assertion: "(iso_code, year) must be unique after dedup"
  filters_applied:
    - "iso_code IS NOT NULL"
    - "year >= 1960"
    - "co2 IS NULL OR co2 >= 0"
  column_count: 25
fields:
  - { name: iso_code,                  type: string,  nullable: false, description: "ISO-3 country code; primary key with year." }
  - { name: country,                   type: string,  nullable: true,  description: "OWID country display name." }
  - { name: year,                      type: int,     nullable: false, description: "Calendar year (annual frequency).", constraints: { min: 1960, max: 2024 } }
  - { name: co2,                       type: double,  nullable: true,  description: "Annual CO2 emissions (Mt).", constraints: { min: 0 } }
  - { name: co2_per_capita,            type: double,  nullable: true,  description: "CO2 per capita (t).", constraints: { min: 0 } }
  - { name: co2_growth_pct,            type: double,  nullable: true,  description: "Year-over-year growth rate of total CO2 (%). Aliased from OWID column 'co2_growth_prct'." }
  - { name: coal_co2,                  type: double,  nullable: true,  description: "CO2 from coal (Mt).", constraints: { min: 0 } }
  - { name: oil_co2,                   type: double,  nullable: true,  description: "CO2 from oil (Mt).", constraints: { min: 0 } }
  - { name: gas_co2,                   type: double,  nullable: true,  description: "CO2 from natural gas (Mt).", constraints: { min: 0 } }
  - { name: cement_co2,                type: double,  nullable: true,  description: "CO2 from cement production (Mt).", constraints: { min: 0 } }
  - { name: flaring_co2,               type: double,  nullable: true,  description: "CO2 from gas flaring (Mt).", constraints: { min: 0 } }
  - { name: total_ghg,                 type: double,  nullable: true,  description: "Total greenhouse gases including CO2/CH4/N2O (CO2-eq, Mt).", constraints: { min: 0 } }
  - { name: methane,                   type: double,  nullable: true,  description: "Methane emissions (CO2-eq, Mt).", constraints: { min: 0 } }
  - { name: nitrous_oxide,             type: double,  nullable: true,  description: "Nitrous oxide emissions (CO2-eq, Mt).", constraints: { min: 0 } }
  - { name: primary_energy_consumption,type: double,  nullable: true,  description: "Total primary energy consumption (TWh).", constraints: { min: 0 } }
  - { name: population,                type: double,  nullable: true,  description: "Population (count). Stored as double for Spark/parquet compatibility.", constraints: { min: 0 } }
  - { name: gdp,                       type: double,  nullable: true,  description: "Gross domestic product (constant 2011 international $).", constraints: { min: 0 } }
  - { name: gdp_growth_pct,            type: double,  nullable: true,  description: "WDI indicator NY.GDP.MKTP.KD.ZG (annual real GDP growth %). Joined from WorldBank Bronze." }
  - { name: urban_population_pct,      type: double,  nullable: true,  description: "WDI indicator SP.URB.TOTL.IN.ZS (urban population %). Joined from WorldBank Bronze.", constraints: { min: 0, max: 100 } }
  - { name: manufacturing_pct_gdp,     type: double,  nullable: true,  description: "WDI indicator NV.IND.MANF.ZS (manufacturing % of GDP). Joined from WorldBank Bronze.", constraints: { min: 0, max: 100 } }
  - { name: ratification_year,         type: int,     nullable: true,  description: "Year the country ratified the Paris Agreement; NULL for non-ratifying countries. Joined from Paris Bronze.", constraints: { min: 2015, max: 2030 } }
  - { name: paris_treated,             type: bool,    nullable: false, description: "Derived: TRUE iff ratification_year is non-null AND year >= ratification_year." }
  - { name: years_since_ratification,  type: int,     nullable: false, description: "Derived: max(0, year - ratification_year); 0 if ratification_year is NULL.", constraints: { min: 0 } }
  - { name: _ingested_at,              type: string,  nullable: false, description: "ISO-8601 UTC timestamp recorded at the time of Bronze ingestion (carried forward from OWID Bronze)." }
  - { name: _source_url,               type: string,  nullable: false, description: "Source URL from which the upstream OWID record was fetched." }
